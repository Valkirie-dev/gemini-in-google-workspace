name: Build and Deploy AsciiDoc

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Asciidoctor
        run: gem install asciidoctor

      - name: Prepare Output Directory
        run: mkdir -p out

      - name: Copy supporting files
        # Копируем картинки и ресурсы из docs в out
        run: |
          if [ -d "docs" ]; then
            rsync -av --exclude='*.adoc' docs/ out/
          else
            echo "Error: Directory 'docs' not found in the root of the repository"
            exit 1
          fi

      - name: Build AsciiDoc to HTML
        # Файл docs/index.adoc станет файлом out/index.html
        run: |
          find docs -name "*.adoc" -exec asciidoctor \
            -a toc! \
            -a nofooter \
            -a data-uri \
            -a stem=latexmath \
            -a stylesdir=$GITHUB_WORKSPACE/docs \
            -a stylesheet=my-stylesheet.css \
            -R docs \
            -D out \
            {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4