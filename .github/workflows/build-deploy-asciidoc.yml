name: Build and Deploy AsciiDoc

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build in Docker
        # Мы запускаем Docker-команду напрямую, чтобы не ограничивать окружение всего Job-а
        run: |
          docker run --rm -v ${{ github.workspace }}:/src -w /src asciidoctor/docker-asciidoctor /bin/sh -c "
            mkdir -p out
            asciidoctor \
              -a toc! \
              -a nofooter \
              -a data-uri \
              -a stem=latexmath \
              -a stylesdir=/src/docs \
              -a stylesheet=my-stylesheet.css \
              -a copycss=/src/docs/my-stylesheet.css \
              -R docs \
              -D out \
              '**/*.adoc'
            
            cd docs
            find . \( \
              -name '*.ipynb' -o -name '*.py' -o -name '*.yaml' -o -name '*.yml' -o \
              -name '*.conf' -o -name '*.zip' -o -name '*.pdf' -o -name '*.csv' -o \
              -name '*.txt' -o -name '*.html' -o -name '*.css' -o -name '*.js' -o \
              -name '*.mp4' -o -name '*.gif' -o -name '*.png' -o -name '*.jpg' -o \
              -name '*.jpeg' -o -name '*.svg' \
            \) -print | cpio -pdm ../out
          "

      - name: Upload Pages artifact
        # Теперь этот шаг запускается на Ubuntu-хосте, где tar полноценный
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4