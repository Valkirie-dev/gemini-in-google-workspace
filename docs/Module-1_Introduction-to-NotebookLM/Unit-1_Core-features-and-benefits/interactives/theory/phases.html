<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIX AI: RAG Workflow Phases</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Import Corporate Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            /* Copied from my-stylesheet.css */
            --primary: #00a6eb;
            --accent: #e60036;
            --text-main: #302a40;
            --text-muted: #5f6c7b;
            --header-dark: #2a668e;
            --bg-card: #ffffff;
            --radius-lg: 16px;
            --shadow-soft: 0 12px 40px -15px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 15px 50px -10px rgba(0, 166, 235, 0.15);
        }

        /* --- CRITICAL STYLES FOR IFRAME INTEGRATION --- */
        html, body {
            height: auto !important;
            min-height: 0 !important;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Hide internal scrollbars */
            background-color: transparent; /* Transparent background to blend with parent */
            font-family: 'Manrope', sans-serif; /* Corporate Font */
            color: var(--text-main);
        }

        #root {
            /* 'flow-root' creates a new block formatting context.
               It ensures all child margins are contained within the wrapper's height. */
            display: flow-root; 
            width: 100%;
            max-width: 1024px;
            margin: 0 auto; /* Center the container */
            padding: 2px; /* Small buffer to prevent cutting off shadows */
        }

        /* --- MODULE SPECIFIC STYLES --- */

        /* Animations */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Step Card Styles */
        .step-card {
            background-color: var(--bg-card);
            border: 1px solid #e1e4e8;
            border-radius: var(--radius-lg);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .step-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icon = ({ name, className, color }) => {
            const style = { color: color };
            switch(name) {
                case 'Database': return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
                case 'Search': return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
                case 'Layers': return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
                case 'Cpu': return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
                case 'MessageSquare': return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
                case 'FileText': return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
                case 'Target': return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
                default: return null;
            }
        };

        // --- DATA ---
        const PHASES = [
            {
                id: 'phase1',
                title: "Phase 1: Indexing and Augmentation",
                subtitle: "Data Preparation",
                colorVar: "var(--primary)", 
                icon: "Database",
                intro: "When your team uploads sources — such as legacy code documentation, meeting recordings, or project requirements — the system executes a multi-step pipeline:",
                steps: [
                    { title: "Data Collection & Chunking", icon: "Layers", desc: "The data is gathered and broken into \"chunks\"." },
                    { title: "Conversion to Embeddings", icon: "Cpu", desc: "Each chunk is converted into an embedding. These numeric codes capture the \"spirit\" of the information." },
                    { title: "Vector Storage", icon: "Database", desc: "These embeddings are deposited into a vector database, creating a searchable mathematical map of your company's knowledge." }
                ]
            },
            {
                id: 'phase2',
                title: "Phase 2: Retrieval and Generation",
                subtitle: "Query Execution",
                colorVar: "var(--accent)", 
                icon: "Search",
                intro: "When someone from your team asks a question, the system follows a rigorous retrieval path:",
                steps: [
                    { title: "Query Transformation", icon: "MessageSquare", desc: "Your question is converted into its own embedding." },
                    { title: "Mathematical Matching", icon: "Target", desc: "A specialized subsystem uses mathematical instruments to compare your question’s embedding against the database." },
                    { title: "Contextual Prompting", icon: "Layers", desc: "These specific chunks are combined with your original question to form a detailed prompt for the LLM." },
                    { title: "Grounded Generation", icon: "FileText", desc: "The LLM (Gemini) generates an answer based strictly on the information retrieved from the database." }
                ]
            }
        ];

        // --- COMPONENTS ---

        const StepCard = ({ step, index, colorVar }) => (
            <div className="step-card flex gap-4 p-5">
                <div 
                    className="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center text-white shadow-md"
                    style={{ backgroundColor: colorVar }}
                >
                    <Icon name={step.icon} className="w-6 h-6" color="white" />
                </div>
                <div>
                    <h4 className="font-bold text-lg mb-2" style={{ color: 'var(--header-dark)' }}>
                        {index + 1}. {step.title}
                    </h4>
                    <p className="text-sm leading-relaxed" style={{ color: 'var(--text-main)' }}>
                        {step.desc}
                    </p>
                </div>
            </div>
        );

        const TabButton = ({ phase, isActive, onClick }) => (
            <button
                onClick={onClick}
                className={`flex-1 py-4 px-6 text-center font-bold text-sm md:text-base uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-2 border-b-4
                    ${isActive 
                        ? 'bg-white' 
                        : 'bg-slate-50 border-transparent hover:bg-slate-100'}
                `}
                style={{ 
                    borderColor: isActive ? phase.colorVar : 'transparent',
                    color: isActive ? 'var(--text-main)' : 'var(--text-muted)'
                }}
            >
                <Icon name={phase.icon} className="w-5 h-5" color={isActive ? phase.colorVar : 'var(--text-muted)'} />
                <span className={isActive ? '' : 'opacity-70'}>{phase.title}</span>
            </button>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState(PHASES[0].id);
            const currentPhase = PHASES.find(p => p.id === activeTab);

            // --- AUTO-RESIZE LOGIC ---
            // This hook ensures the iframe resizes whenever content changes (e.g., tab switch)
            useEffect(() => {
                const sendHeight = () => {
                    const height = document.documentElement.scrollHeight;
                    // Send message to parent using the new 'resize' type protocol
                    if(height > 50) {
                        window.parent.postMessage({ type: 'resize', height: height }, '*');
                    }
                };

                // 1. Setup ResizeObserver to detect DOM changes
                const observer = new ResizeObserver(sendHeight);
                observer.observe(document.body);
                
                // 2. Extra check: trigger shortly after tab switch to account for animations
                setTimeout(sendHeight, 450); // 450ms covers the 400ms CSS animation

                // Cleanup on unmount
                return () => observer.disconnect();
            }, [activeTab]); // Re-run effect when tab changes

            return (
                <div 
                    className="w-full rounded-[var(--radius-lg)] shadow-[var(--shadow-soft)] overflow-hidden"
                    style={{ backgroundColor: 'var(--bg-card)' }}
                >
                    
                    {/* Tabs Header */}
                    <div className="flex flex-col md:flex-row border-b border-slate-200">
                        {PHASES.map(phase => (
                            <TabButton 
                                key={phase.id} 
                                phase={phase} 
                                isActive={activeTab === phase.id} 
                                onClick={() => setActiveTab(phase.id)} 
                            />
                        ))}
                    </div>

                    {/* Content Area */}
                    <div className="p-6 md:p-10 relative">
                        
                        <div key={currentPhase.id} className="fade-in">
                            
                            {/* Phase Header */}
                            <div className="mb-8 text-center md:text-left border-b border-slate-100 pb-6">
                                <h2 className="text-3xl font-bold mb-2" style={{ color: currentPhase.colorVar }}>
                                    {currentPhase.title}
                                </h2>
                                <span 
                                    className="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest text-white mb-4" 
                                    style={{ backgroundColor: 'var(--header-dark)' }}
                                >
                                    {currentPhase.subtitle}
                                </span>
                                <p className="text-lg leading-relaxed font-light" style={{ color: 'var(--text-muted)' }}>
                                    {currentPhase.intro}
                                </p>
                            </div>

                            {/* Steps Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {currentPhase.steps.map((step, idx) => (
                                    <StepCard 
                                        key={idx} 
                                        step={step} 
                                        index={idx} 
                                        colorVar={currentPhase.colorVar} 
                                    />
                                ))}
                            </div>

                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
