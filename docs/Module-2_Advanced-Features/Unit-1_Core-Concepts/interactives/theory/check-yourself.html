<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Check Yourself Quiz</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    primary: '#00A6EB', accent: '#E60036', dark: '#302A40',
                    muted: '#5f6c7b', lightblue: '#81D0F4', darkblue: '#2A668E',
                    slate: '#937C8A'
                },
                fontFamily: { sans: ['Manrope', 'sans-serif'] }
            }}
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #root {
            width: 100%;
            display: flow-root;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .btn-primary {
            background-color: #00A6EB;
            color: white;
            font-weight: 700;
            padding: 0.5rem 1.25rem;
            border-radius: 0.375rem;
            transition: background-color 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #0086c9;
        }
        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .correct {
            color: #059669; /* green-600 */
            font-weight: 700;
        }
        .incorrect {
            color: #dc2626; /* red-600 */
            font-weight: 700;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const QUESTIONS = [
    {
        id: 1,
        question: "What is the primary function of Gemini in Google Workspace?",
        options: [
            { id: 'A', text: "To act as a standalone social media platform." },
            { id: 'B', text: "To enhance productivity through integrated generative AI capabilities." },
            { id: 'C', text: "To replace the need for a Google Account." }
        ],
        correctId: 'B',
        explanation: "Gemini assists with tasks like document creation and data analysis within Workspace apps using generative AI."
    },
    {
        id: 2,
        question: "Which of the following is a recommended security measure when signing in on a public device?",
        options: [
            { id: 'A', text: "Sharing your password with the network administrator." },
            { id: 'B', text: 'Using the "Forgot email?" link every time you log in.' },
            { id: 'C', text: "Utilizing a private browsing window or Guest mode." }
        ],
        correctId: 'C',
        explanation: "Google advises using private browsing or Guest mode on computers that are not your own to protect account security."
    },
    {
        id: 3,
        question: "With which group of applications does Gemini integrate seamlessly?",
        options: [
            { id: 'A', text: "Gmail, Docs, Sheets, and Slides." },
            { id: 'B', text: "Only third-party web browsers." },
            { id: 'C', text: "Legacy offline word processors only." }
        ],
        correctId: 'A',
        explanation: "Gemini integrates directly with core Workspace apps like Gmail, Docs, Sheets, and Slides."
    },
    {
        id: 4,
        question: 'What does "contextual AI assistance" mean in the context of Gemini?',
        options: [
            { id: 'A', text: "The AI only works when connected to a specific office Wi-Fi." },
            { id: 'B', text: "The AI support adapts to specific professional and organizational needs." },
            { id: 'C', text: "The AI provides the same generic response regardless of the application." }
        ],
        correctId: 'B',
        explanation: "Gemini offers AI help tailored to different tasks and user requirements."
    },
    {
        id: 5,
        question: "What credentials are required to sign in and access Gemini's features?",
        options: [
            { id: 'A', text: "A Google Account (Email or phone)." },
            { id: 'B', text: "A physical security key only." },
            { id: 'C', text: "An employee ID number from a non-Google database." }
        ],
        correctId: 'A',
        explanation: "Access requires signing in with a Google Account using email or phone number."
    }
];

function Quiz() {
    const [answers, setAnswers] = React.useState({});
    const [submitted, setSubmitted] = React.useState(false);
    const [score, setScore] = React.useState(null);

    React.useEffect(() => {
        if (window.ActivityClient) {
            window.ActivityClient.registerActivity(QUESTIONS.length);
        }
    }, []);

    React.useEffect(() => {
        // Resize on mount, answers change, submit change
        const sendHeight = () => {
            const h = document.documentElement.scrollHeight;
            if (h > 50) window.parent.postMessage({ type: 'resize', height: h }, '*');
        };
        sendHeight();
        const observer = new ResizeObserver(sendHeight);
        observer.observe(document.body);
        return () => observer.disconnect();
    }, [answers, submitted]);

    function selectOption(qid, oid) {
        if (submitted) return; // no change after submit
        setAnswers(prev => ({ ...prev, [qid]: oid }));
    }

    function onSubmit() {
        if (Object.keys(answers).length !== QUESTIONS.length) {
            alert("Please answer all questions before submitting.");
            return;
        }
        let correctCount = 0;
        QUESTIONS.forEach(q => {
            if (answers[q.id] === q.correctId) correctCount++;
        });
        setScore(correctCount);
        setSubmitted(true);
        if (window.ActivityClient) {
            window.ActivityClient.sendScore(null, correctCount, QUESTIONS.length);
        }
    }

    function onTryAgain() {
        setAnswers({});
        setSubmitted(false);
        setScore(null);
    }

    return (
        <div className="p-4 max-w-3xl mx-auto">
            <h1 className="text-2xl font-extrabold text-dark mb-5">Check Yourself</h1>
            <form onSubmit={e => { e.preventDefault(); onSubmit(); }}>
                {QUESTIONS.map(q => {
                    const userAns = answers[q.id];
                    const isSubmitted = submitted;
                    let feedbackClass = "";
                    if (isSubmitted) {
                        feedbackClass = (userAns === q.correctId) ? "correct" : "incorrect";
                    }
                    return (
                        <fieldset key={q.id} className="mb-6 p-4 rounded-lg bg-white dark:bg-gray-800 ring-1 ring-gray-300 dark:ring-gray-700">
                            <legend className="font-semibold mb-2 text-dark">{q.id}. {q.question}</legend>
                            <div role="radiogroup" aria-labelledby={`question-${q.id}`}>
                                {q.options.map(o => {
                                    const checked = userAns === o.id;
                                    const isCorrect = o.id === q.correctId;
                                    const showFeedback = isSubmitted && checked;
                                    return (
                                        <label key={o.id} className={`flex items-center mb-1 cursor-pointer select-none p-1 rounded
                                            ${showFeedback ? (checked && isCorrect ? 'bg-green-100 text-green-800' : (checked && !isCorrect ? 'bg-red-100 text-red-800' : '')) : ''}
                                            `}>
                                            <input
                                                type="radio"
                                                name={`q-${q.id}`}
                                                value={o.id}
                                                checked={checked || false}
                                                disabled={submitted}
                                                onChange={() => selectOption(q.id, o.id)}
                                                className="mr-3"
                                                aria-checked={checked}
                                            />
                                            <span>{o.id}) {o.text}</span>
                                        </label>
                                    );
                                })}
                            </div>
                            {submitted && (
                                <p className={`${feedbackClass} mt-2 font-semibold`}>
                                    {userAns === q.correctId ? "Correct!" : `Incorrect. ${q.explanation}`}
                                </p>
                            )}
                        </fieldset>
                    );
                })}
                <div className="flex space-x-4">
                    {!submitted ? (
                        <button type="submit" disabled={Object.keys(answers).length !== QUESTIONS.length}
                            className={`btn-primary ${Object.keys(answers).length !== QUESTIONS.length ? 'btn-disabled' : ''}`}>
                            Submit
                        </button>
                    ) : (
                        <button type="button" onClick={onTryAgain} className="btn-primary">Try Again</button>
                    )}
                    {submitted && (
                        <div className="text-dark font-bold self-center">
                            Score: {score} / {QUESTIONS.length}
                        </div>
                    )}
                </div>
            </form>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Quiz />);
</script>

<script src='../../../../util/scripts/client.js'></script>
</body>
</html>
