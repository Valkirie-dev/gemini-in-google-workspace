<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Yourself</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Manrope', system-ui, sans-serif; background: transparent; margin: 0; padding: 0; overflow: hidden; color: #1e293b; }
        .progress-bar { height: 4px; background: #f1f5f9; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00A6EB, #E60036); border-radius: 0 2px 2px 0; transition: width 0.4s ease; }
        .wrap { padding: 16px; }
        .questions { display: flex; flex-direction: column; gap: 14px; }
        .q-card { background: #fff; border: 1.5px solid #f1f5f9; border-radius: 14px; padding: 20px 22px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); overflow: hidden; position: relative; }
        .q-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
        .q-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
        .q-num { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 28px; background: #00A6EB; color: white; border-radius: 50%; font-size: 12px; font-weight: 800; flex-shrink: 0; margin-top: 1px; }
        .q-text { font-size: 14.5px; font-weight: 700; color: #1e293b; line-height: 1.5; margin: 0; }
        .options { display: flex; flex-direction: column; gap: 8px; }
        .opt { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 1.5px solid #f1f5f9; border-radius: 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s; user-select: none; }
        .opt:hover:not(.disabled) { border-color: #00A6EB; background: #f0f9ff; }
        .opt.selected { border-color: #00A6EB; background: #e0f2fe; }
        .opt.correct { border-color: #22c55e; background: #f0fdf4; }
        .opt.wrong { border-color: #ef4444; background: #fef2f2; }
        .opt.disabled { cursor: default; }
        .dot { width: 18px; height: 18px; border: 2px solid #cbd5e1; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .opt.selected .dot { border-color: #00A6EB; }
        .opt.correct .dot { border-color: #22c55e; }
        .opt.wrong .dot { border-color: #ef4444; }
        .dot-in { width: 8px; height: 8px; border-radius: 50%; display: none; }
        .opt.selected .dot-in { display: block; background: #00A6EB; }
        .opt.correct .dot-in { display: block; background: #22c55e; }
        .opt.wrong .dot-in { display: block; background: #ef4444; }
        .opt-text { font-size: 13.5px; font-weight: 500; color: #334155; line-height: 1.4; }
        .feedback { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; display: none; }
        .feedback.ok { background: #f0fdf4; color: #166534; border-left: 3px solid #22c55e; display: block; }
        .feedback.bad { background: #fef2f2; color: #991b1b; border-left: 3px solid #ef4444; display: block; }
        .submit-row { margin-top: 20px; padding: 0 0 4px; display: flex; justify-content: center; }
        .btn { padding: 13px 44px; font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 800; border: none; border-radius: 50px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em; }
        .btn-submit { background: linear-gradient(135deg, #00A6EB, #0082c0); color: white; box-shadow: 0 4px 14px rgba(0,166,235,0.4); }
        .btn-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,166,235,0.5); }
        .btn-submit:disabled { background: #e2e8f0; color: #94a3b8; box-shadow: none; cursor: not-allowed; }
        .btn-retry { background: #302A40; color: white; box-shadow: 0 4px 14px rgba(48,42,64,0.3); }
        .btn-retry:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(48,42,64,0.4); }
        .score-card { margin-top: 20px; text-align: center; padding: 28px 24px; background: white; border: 1.5px solid #f1f5f9; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
        .score-ring { display: inline-flex; align-items: center; justify-content: center; width: 90px; height: 90px; border-radius: 50%; margin-bottom: 12px; }
        .score-ring.pass { background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 4px 20px rgba(34,197,94,0.35); }
        .score-ring.fail { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 20px rgba(239,68,68,0.35); }
        .score-num { font-size: 28px; font-weight: 800; color: white; }
        .score-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 6px; }
        .score-msg { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 20px; }
        .score-sub { font-size: 12px; color: #64748b; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
<div class="wrap"><div id="root"></div></div>
<script>
const Q = [
    { id:1, text:"What is the primary function of Gemini in Google Workspace?",
      opts:[{id:'A',t:"To act as a standalone social media platform."},{id:'B',t:"To enhance productivity through integrated generative AI capabilities."},{id:'C',t:"To replace the need for a Google Account."}],
      correct:'B', expl:"Gemini assists with document creation, data analysis, and more within Workspace apps using generative AI." },
    { id:2, text:"Which is a recommended security measure when signing in on a public device?",
      opts:[{id:'A',t:"Sharing your password with the network administrator."},{id:'B',t:'Using the "Forgot email?" link every time you log in.'},{id:'C',t:"Utilizing a private browsing window or Guest mode."}],
      correct:'C', expl:"Google advises using private browsing or Guest mode on computers that are not your own." },
    { id:3, text:"With which group of applications does Gemini integrate seamlessly?",
      opts:[{id:'A',t:"Gmail, Docs, Sheets, and Slides."},{id:'B',t:"Only third-party web browsers."},{id:'C',t:"Legacy offline word processors only."}],
      correct:'A', expl:"Gemini integrates directly with core Workspace apps: Gmail, Docs, Sheets, and Slides." },
    { id:4, text:'What does "contextual AI assistance" mean in Gemini?',
      opts:[{id:'A',t:"The AI only works on a specific office Wi-Fi network."},{id:'B',t:"The AI support adapts to specific professional and organizational needs."},{id:'C',t:"The AI gives the same generic response in every application."}],
      correct:'B', expl:"Gemini tailors AI help to different tasks and user requirements within each application." },
    { id:5, text:"What credentials are required to sign in and access Gemini's features?",
      opts:[{id:'A',t:"A Google Account (email or phone)."},{id:'B',t:"A physical security key only."},{id:'C',t:"An employee ID from a non-Google database."}],
      correct:'A', expl:"Access requires signing in with a Google Account using an email or phone number." }
];
let answers = {}, submitted = false;
function updateProgress() {
    const pct = (Object.keys(answers).length / Q.length) * 100;
    document.getElementById('prog').style.width = pct + '%';
}
function render() {
    const qHtml = Q.map((q,qi) => {
        const optsHtml = q.opts.map(o => {
            let cls = 'opt';
            const sel = answers[q.id] === o.id;
            if (sel) cls += ' selected';
            if (submitted) { cls += ' disabled'; if (sel) cls += (o.id===q.correct)?' correct':' wrong'; }
            return `<div class="${cls}" data-q="${q.id}" data-o="${o.id}">
                <div class="dot"><div class="dot-in"></div></div>
                <span class="opt-text">${o.id}) ${o.t}</span>
            </div>`;
        }).join('');
        let fb = '';
        if (submitted && answers[q.id]) {
            const ok = answers[q.id]===q.correct;
            fb = `<div class="feedback ${ok?'ok':'bad'}">${ok?'✓ Correct!':'✗ Incorrect. '+q.expl}</div>`;
        }
        const accentColor = submitted ? (answers[q.id]===q.correct ? '#22c55e' : (answers[q.id] ? '#ef4444' : '#00A6EB')) : '#00A6EB';
        return `<div class="q-card" style="--ac:${accentColor}">
            <style>.q-card:nth-child(${qi+1})::before{background:${accentColor}}</style>
            <div class="q-head"><span class="q-num" style="background:${accentColor}">${qi+1}</span><p class="q-text">${q.text}</p></div>
            <div class="options">${optsHtml}</div>${fb}
        </div>`;
    }).join('');
    const allDone = Q.every(q=>answers[q.id]);
    let bottom = '';
    if (!submitted) {
        bottom = `<div class="submit-row"><button class="btn btn-submit" id="sbmt" ${allDone?'':'disabled'}>Submit Answers</button></div>`;
    } else {
        const sc = Q.filter(q=>answers[q.id]===q.correct).length;
        const pass = sc >= Math.ceil(Q.length*0.8);
        bottom = `<div class="score-card">
            <div class="score-label">Your Score</div>
            <div class="score-ring ${pass?'pass':'fail'}"><span class="score-num">${sc}/${Q.length}</span></div>
            <div class="score-msg">${pass?'🎉 Well done! You passed.':'Keep going — review and try again.'}</div>
            <div class="score-sub">${pass?'You have a solid understanding of the material.':'Focus on the questions marked incorrect above.'}</div>
            <button class="btn btn-retry" id="retry">↺ Try Again</button>
        </div>`;
    }
    document.getElementById('root').innerHTML = `<div class="questions">${qHtml}</div>${bottom}`;
    document.querySelectorAll('.opt:not(.disabled)').forEach(el =>
        el.addEventListener('click', () => { answers[el.dataset.q]=el.dataset.o; updateProgress(); render(); ping(); })
    );
    const sb = document.getElementById('sbmt');
    if (sb) sb.addEventListener('click', () => {
        const sc = Q.filter(q=>answers[q.id]===q.correct).length;
        submitted=true; render(); ping();
        if (window.ActivityClient) window.ActivityClient.sendScore(null,sc,Q.length);
    });
    const rb = document.getElementById('retry');
    if (rb) rb.addEventListener('click', ()=>{answers={};submitted=false;updateProgress();render();ping();});
}
function ping() { const h=document.documentElement.scrollHeight; if(h>50) window.parent.postMessage({type:'resize',height:h},'*'); }
window.addEventListener('load', ()=>{ if(window.ActivityClient) window.ActivityClient.registerActivity(Q.length); });
render();
new ResizeObserver(ping).observe(document.body);
setTimeout(ping,150);setTimeout(ping,500);
</script>
<script src='../../../../util/scripts/client.js'></script>
</body>
</html>
