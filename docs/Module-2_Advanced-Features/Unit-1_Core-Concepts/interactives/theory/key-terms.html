<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Key Terms Flashcards</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    primary: '#00A6EB', accent: '#E60036', dark: '#302A40',
                    muted: '#5f6c7b', lightblue: '#81D0F4', darkblue: '#2A668E',
                    slate: '#937C8A'
                },
                fontFamily: { sans: ['Manrope', 'sans-serif'] }
            }}
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #root {
            display: flow-root;
            width: 100%;
        }
        /* 3D flip (key-terms only) */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 { transform: rotateY(180deg); }
        /* Fade animation */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CARDS = [
    {
        id: 1,
        term: "Gemini in Google Workspace",
        sub: "Product Suite",
        icon: "Shield",
        accent: "#00A6EB",
        def: "A suite of advanced AI-powered productivity tools integrated within Google Workspace applications to enhance user experience."
    },
    {
        id: 2,
        term: "Generative AI",
        sub: "Technology",
        icon: "Cpu",
        accent: "#00A6EB",
        def: "AI technology used by Gemini for tasks such as document creation, email drafting, and data analysis."
    },
    {
        id: 3,
        term: "Contextual AI Assistance",
        sub: "Feature",
        icon: "MessageSquare",
        accent: "#00A6EB",
        def: "AI support that adapts to different professional and organizational needs within specific Workspace apps."
    },
    {
        id: 4,
        term: "Guest Mode / Private Browsing",
        sub: "Security Feature",
        icon: "RAG",
        accent: "#00A6EB",
        def: "Secure browsing state recommended for users signing into Google Accounts on shared or public devices."
    },
    {
        id: 5,
        term: "Workflow Automation",
        sub: "Process",
        icon: "Target",
        accent: "#00A6EB",
        def: "The use of AI-driven insights and tools to improve efficiency and streamline repetitive tasks across Workspace applications."
    }
];

// Simple inline SVG icons for demonstration (Shield, Cpu, MessageSquare, RAG, Target)
const ICONS = {
    Shield: (
        <svg className="w-6 h-6" fill="#00A6EB" viewBox="0 0 24 24" stroke="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 6v6c0 5 3.8 9.74 9 10 5.2-.26 9-5 9-10V6l-9-4z"/>
        </svg>
    ),
    Cpu: (
        <svg className="w-6 h-6" fill="#00A6EB" viewBox="0 0 24 24" stroke="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="6" width="12" height="12" rx="2" ry="2" />
            <path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/>
        </svg>
    ),
    MessageSquare: (
        <svg className="w-6 h-6" fill="#00A6EB" viewBox="0 0 24 24" stroke="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
            <path d="M8 21l4-4 4 4" />
        </svg>
    ),
    RAG: (
        <svg className="w-6 h-6" fill="#00A6EB" viewBox="0 0 24 24" stroke="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 6v6l4 2" stroke="#fff" strokeWidth="2" fill="none"/>
        </svg>
    ),
    Target: (
        <svg className="w-6 h-6" fill="#00A6EB" viewBox="0 0 24 24" stroke="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="6" fill="none" stroke="#00A6EB" strokeWidth="2"/>
            <circle cx="12" cy="12" r="2" />
        </svg>
    )
};

function FlashCard({ card }) {
    const [flipped, setFlipped] = useState(false);
    const cardRef = React.useRef(null);

    const toggleFlip = () => setFlipped(!flipped);

    return (
        <div
            className="perspective-1000 m-4 w-full sm:w-[340px] cursor-pointer"
            onClick={toggleFlip}
            aria-label={`Flashcard ${card.term}`}
            role="button"
            tabIndex={0}
            onKeyDown={(e) => (e.key === 'Enter' || e.key === ' ') && toggleFlip()}
        >
            <div
                ref={cardRef}
                className={
                    `relative transform-style-3d duration-500 ease-in-out ` + 
                    (flipped ? 'rotate-y-180' : '')
                }
            >
                {/* Front */}
                <div className="absolute w-full h-full backface-hidden bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6 flex flex-col justify-center items-start ring-2 ring-primary">
                    <div className="flex items-center space-x-3 mb-2 text-primary">
                        {ICONS[card.icon]}
                        <h3 className="text-xl font-extrabold">{card.term}</h3>
                    </div>
                    <p className="text-primary font-semibold italic">{card.sub}</p>
                </div>
                {/* Back */}
                <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-primary text-white rounded-lg shadow-lg p-6 flex items-center animate-fade-in">
                    <p className="text-sm leading-relaxed">{card.def}</p>
                </div>
            </div>
        </div>
    );
}

function App() {
    React.useEffect(() => {
        // Resize on mount and on any update (no dependencies other than mount)
        const sendHeight = () => {
            const h = document.documentElement.scrollHeight;
            if (h > 50) window.parent.postMessage({ type: 'resize', height: h }, '*');
        };
        const observer = new ResizeObserver(sendHeight);
        observer.observe(document.body);
        setTimeout(sendHeight, 250);
        setTimeout(sendHeight, 500);
        return () => observer.disconnect();
    }, []);

    return (
        <main className="p-4 flex flex-wrap justify-center">
            {CARDS.map(card => <FlashCard key={card.id} card={card} />)}
        </main>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
