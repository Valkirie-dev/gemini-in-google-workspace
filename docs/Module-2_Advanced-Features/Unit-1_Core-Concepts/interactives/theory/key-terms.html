<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Terms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Manrope', system-ui, sans-serif; background: transparent; margin: 0; padding: 16px; overflow: hidden; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; }
        .card { position: relative; width: calc(33.333% - 10px); min-width: 180px; height: 190px; cursor: pointer; user-select: none; }
        @media (max-width: 600px) { .card { width: calc(50% - 8px); } }
        @media (max-width: 380px) { .card { width: 100%; } }
        .face { position: absolute; inset: 0; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; justify-content: center; transition: opacity 0.3s ease, transform 0.3s ease; }
        .face-front { background: #ffffff; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card:hover .face-front { box-shadow: 0 8px 30px rgba(0,0,0,0.13); transform: translateY(-2px); }
        .face-back { color: white; opacity: 0; pointer-events: none; transform: scale(0.96); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .card.flipped .face-front { opacity: 0; pointer-events: none; transform: scale(0.96); }
        .card.flipped .face-back { opacity: 1; pointer-events: auto; transform: scale(1); }
        .icon-wrap { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 12px; }
        .card-term { font-size: 15px; font-weight: 800; color: #1e293b; line-height: 1.25; margin-bottom: 4px; }
        .card-sub { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
        .flip-hint { position: absolute; bottom: 12px; right: 14px; font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 3px; }
        .back-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; margin-bottom: 10px; }
        .card-def { font-size: 12.5px; line-height: 1.65; font-weight: 500; }
    </style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
const CARDS = [
    { icon:"⚡", term:"Gemini in Google Workspace", sub:"Product Suite",
      iconBg:"rgba(0,166,235,0.12)", iconColor:"#00A6EB", backColor:"#00A6EB",
      def:"A suite of advanced AI-powered productivity tools integrated within Google Workspace to enhance user experience across all applications." },
    { icon:"✨", term:"Generative AI", sub:"Technology",
      iconBg:"rgba(48,42,64,0.08)", iconColor:"#302A40", backColor:"#302A40",
      def:"AI technology used by Gemini for tasks such as document creation, email drafting, and data analysis within Workspace." },
    { icon:"🎯", term:"Contextual AI Assistance", sub:"Feature",
      iconBg:"rgba(0,166,235,0.12)", iconColor:"#00A6EB", backColor:"#00A6EB",
      def:"AI support that adapts to different professional and organizational needs within specific Google Workspace applications." },
    { icon:"🔒", term:"Guest Mode / Private Browsing", sub:"Security Feature",
      iconBg:"rgba(230,0,54,0.1)", iconColor:"#E60036", backColor:"#E60036",
      def:"Secure browsing state recommended for users signing into Google Accounts on shared or public devices to protect credentials." },
    { icon:"⚙️", term:"Workflow Automation", sub:"Process",
      iconBg:"rgba(48,42,64,0.08)", iconColor:"#302A40", backColor:"#302A40",
      def:"The use of AI-driven insights and tools to improve efficiency and streamline repetitive tasks across Workspace applications." }
];
const grid = document.getElementById('grid');
CARDS.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <div class="face face-front">
            <div class="icon-wrap" style="background:${c.iconBg}">${c.icon}</div>
            <div class="card-term">${c.term}</div>
            <div class="card-sub" style="color:${c.iconColor}">${c.sub}</div>
            <div class="flip-hint" style="color:${c.iconColor}">Tap to flip ↺</div>
        </div>
        <div class="face face-back" style="background:${c.backColor}">
            <div class="back-label">${c.term}</div>
            <div class="card-def">${c.def}</div>
        </div>`;
    card.addEventListener('click', () => card.classList.toggle('flipped'));
    grid.appendChild(card);
});
function ping() {
    const h = document.documentElement.scrollHeight;
    if (h > 50) window.parent.postMessage({ type: 'resize', height: h }, '*');
}
new ResizeObserver(ping).observe(document.body);
setTimeout(ping, 150); setTimeout(ping, 500);
</script>
</body>
</html>
